repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.1
    hooks:
      - id: mypy
        additional_dependencies: [numpy]
        # The store/codec deps are heavy and untyped; we type-check our own
        # package against installed stubs in CI/local env instead.
        pass_filenames: false
        args: [src/coalescing_zarr]
